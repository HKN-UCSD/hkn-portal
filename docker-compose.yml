services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hkn_portal
      POSTGRES_USER: hkn_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hkn_user -d hkn_portal"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    image: hknkappapsidev/hkn-portal:latest
    
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: myapp.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      GOOGLE_SHEETS_CREDENTIALS_PATH: ${GOOGLE_SHEETS_CREDENTIALS_PATH}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}

      POSTGRES_DB: hkn_portal
      POSTGRES_USER: hkn_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    #volumes:
      # - .:/hkn-portal Uncomment for regular Dev work, but remember to npm run build to compile bundle.css!!
    ports:
      - "8000:8000"
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn myapp.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

volumes:
  pgdata:

